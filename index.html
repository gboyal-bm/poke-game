<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pokematch</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="container">
      <header>
        <h1>Pokematch</h1>
        <div>
          <button data-difficulty="easy" onclick="clickDifficulty(event)">
            Easy
          </button>
          <button data-difficulty="medium" onclick="clickDifficulty(event)">
            Medium
          </button>
          <button data-difficulty="hard" onclick="clickDifficulty(event)">
            Hard
          </button>
        </div>
        <div>
          <button onclick="resetGame()">Start Game</button>
          <button onclick="resetGame()">Reset Game</button>
        </div>
      </header>
      <div id="game"></div>
    </div>
    <script src="app.js"></script>
  </body>
</html>
